name: Monthly prune (>2 years old)

on:
  workflow_dispatch:
  schedule:
    # First day of each month at 02:00 UTC.
    - cron: "0 2 1 * *"

env:
  GITHUB_USER_NAME: exopoiesis
  GITHUB_USER_EMAIL: lab@exopoiesis.space

permissions:
  contents: write

jobs:
  prune:
    name: prune
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prune shards + popup HTML older than 2 years
        run: python tools/archive_old.py --threshold-days 730

      - name: Regenerate derived pages
        run: |
          python tools/render_abstracts.py
          python tools/render_readme.py
          python tools/render_tag_pages.py
          python tools/render_index.py

      - name: Push prune changes
        run: |
          git config user.name "${{ env.GITHUB_USER_NAME }}"
          git config user.email "${{ env.GITHUB_USER_EMAIL }}"
          git add README.md data/ abstracts/ docs/abstracts/ docs/_data/ docs/index.md docs/tag/
          git diff --cached --quiet || git commit -m "Monthly prune: drop shards + popup HTML older than 2 years"
          git pull --rebase origin main
          git push